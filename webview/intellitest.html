<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src {{cspSource}} https:; style-src {{cspSource}}; script-src {{cspSource}};">
    <title>IntelliTest</title>
    <link rel="stylesheet" href="{{styleUri}}">
</head>
<body>
    <main class="container">
        <h1>IntelliTest</h1>
        <p class="description">Generate test cases from a feature description.</p>

        <div class="form-group">
            <label for="featureInput">Feature</label>
            <input 
                id="featureInput" 
                type="text" 
                placeholder="e.g., Login system" 
                class="input-field"
            >
        </div>

        <button id="generateButton" class="btn-primary">Generate Test Cases</button>

        <div class="output-section">
            <div class="output-label">Test Cases</div>
            <pre id="output" class="output-content">Your generated test cases will appear here.</pre>
        </div>
    </main>

    <script src="{{scriptUri}}"></script>
</body>
</html>
